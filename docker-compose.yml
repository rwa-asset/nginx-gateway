services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${GATEWAY_CONTAINER_NAME:-gateway-nginx}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${WITTGENS_WEB_ROOT:-/var/www/wittgens}:/var/www/wittgens:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - edge

networks:
  edge:
    name: ${EDGE_NETWORK_NAME:-rwat-edge}
    external: true
